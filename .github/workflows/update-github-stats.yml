name: Update GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  update-github-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate stats JSON
        env:
          GITHUB_STATS_USERNAME: barrydoooit
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
          GITHUB_STATS_OUTPUT: data/github-stats.json
        run: node scripts/update-github-stats.mjs

      - name: Commit updated stats
        run: |
          if git diff --quiet -- data/github-stats.json; then
            echo "No stats changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github-stats.json
          git commit -m "Update GitHub stats"
          git push
